services:
  - type: web
    name: interview-copilot-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_BASE
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: anthropic/claude-sonnet-4.5
      - key: MAX_TOKENS
        value: "12000"
      - key: MAX_CONTINUATIONS
        value: "2"
      - key: LLM_TIMEOUT
        value: "240"
      - key: APP_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
